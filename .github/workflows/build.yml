name: 🛠️ Build

on:
  workflow_call:
    inputs:
      deps-cache-key:
        description: 'Cache key for dependencies'
        type: string
        required: false
      database_url_b64:
        description: 'Base64-encoded DATABASE_URL (for PR feature branches — bypasses GitHub secret suppression)'
        type: string
        required: false
    secrets:
      DATABASE_URL:
        required: false
      AUTH_SECRET:
        required: true
      GOOGLE_CLIENT_ID:
        required: true
      GOOGLE_CLIENT_SECRET:
        required: true
    outputs:
      build-artifact-name:
        description: 'Name of the uploaded build artifact'
        value: ${{ jobs.build.outputs.build-artifact-name }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      build-artifact-name: ${{ steps.artifact-name.outputs.name }}

    steps:
      - name: 🔓 Resolve DATABASE_URL
        env:
          DATABASE_URL_B64: ${{ inputs.database_url_b64 }}
          DATABASE_URL_SECRET: ${{ secrets.DATABASE_URL }}
        run: |
          if [[ -n "$DATABASE_URL_B64" ]]; then
            echo "DATABASE_URL=$(printf '%s' "$DATABASE_URL_B64" | base64 -d)" >> "$GITHUB_ENV"
          else
            echo "DATABASE_URL=$DATABASE_URL_SECRET" >> "$GITHUB_ENV"
          fi

      - name: ⬇️ Checkout repo
        uses: actions/checkout@v5

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4.2.0

      - name: ⎔ Setup node
        uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: 📥 Restore dependencies cache
        if: inputs.deps-cache-key
        id: cache
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ inputs.deps-cache-key }}
          restore-keys: |
            deps-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: 📥 Install deps
        if: inputs.deps-cache-key == '' || steps.cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: 🏗 Build
        run: pnpm build
        env:
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          NODE_ENV: production

      - name: 🎯 Set artifact name
        id: artifact-name
        run: |
          echo "name=build-${{ github.sha }}-${{ github.run_id }}" >> $GITHUB_OUTPUT

      - name: 📦 Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: ${{ steps.artifact-name.outputs.name }}
          path: apps/web/dist
          retention-days: 1
          if-no-files-found: error

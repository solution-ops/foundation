name: 🎭 E2E Tests

on:
  workflow_call:
    inputs:
      base_url:
        description: 'Base URL to test against'
        required: true
        type: string
      deps-cache-key:
        description: 'Cache key for dependencies'
        type: string
        required: false
      browsers:
        description: 'Space-separated list of browsers to test (e.g. "chromium" or "chromium firefox")'
        type: string
        required: false
        default: 'chromium'
      database_url_b64:
        description: 'Base64-encoded DATABASE_URL (for PR feature branches — bypasses GitHub secret suppression)'
        type: string
        required: false
    secrets:
      DATABASE_URL:
        description: 'Database connection string for seed user management'
        required: false
      GOOGLE_CLIENT_ID:
        description: 'Google OAuth client ID for authentication testing'
        required: true
      GOOGLE_CLIENT_SECRET:
        description: 'Google OAuth client secret for authentication testing'
        required: true

jobs:
  e2e:
    name: 🎭 E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: 🔓 Resolve DATABASE_URL
        env:
          DATABASE_URL_B64: ${{ inputs.database_url_b64 }}
          DATABASE_URL_SECRET: ${{ secrets.DATABASE_URL }}
        run: |
          if [[ -n "$DATABASE_URL_B64" ]]; then
            echo "DATABASE_URL=$(printf '%s' "$DATABASE_URL_B64" | base64 -d)" >> "$GITHUB_ENV"
          else
            echo "DATABASE_URL=$DATABASE_URL_SECRET" >> "$GITHUB_ENV"
          fi

      - name: ⬇️ Checkout repo
        uses: actions/checkout@v5

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4.2.0

      - name: ⎔ Setup node
        uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: 📥 Restore dependencies cache
        if: inputs.deps-cache-key
        id: cache
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ inputs.deps-cache-key }}
          restore-keys: |
            deps-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: 📥 Install deps
        if: inputs.deps-cache-key == '' || steps.cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: 📥 Restore Playwright browsers cache
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/ms-playwright
          key: playwright-${{ inputs.browsers }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ runner.os }}
          restore-keys: |
            playwright-${{ inputs.browsers }}-${{ runner.os }}-

      - name: 🔧 Install playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @foundation/e2e exec playwright install ${{ inputs.browsers }} --with-deps

      - name: 🔧 Install system dependencies for cached browsers
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @foundation/e2e exec playwright install-deps ${{ inputs.browsers }}

      - name: 🎭 Run E2E tests
        run: pnpm e2e
        env:
          BASE_URL: ${{ inputs.base_url }}
          PLAYWRIGHT_BROWSERS: ${{ inputs.browsers }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          SEED_USER_EMAIL: e2e-${{ github.run_id }}@example.com
          SEED_USER_PASSWORD: TestPassword123!

      - name: 📸 Upload test results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: playwright-report
          path: apps/e2e/playwright-report/
          retention-days: 30
